          example: agbm_3f8a2b1c
        is_active:
          type: boolean
          example: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ==================== Task Schemas ====================
    AsyncTaskCreated:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
