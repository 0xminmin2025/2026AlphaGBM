openapi: 3.0.3
info:
  title: AlphaGBM API
  description: |
    股票智能分析平台 API 文档

    ## 认证方式
    支持两种认证方式，通过 `Authorization` Header 传入：

    ### 方式一：API Key（推荐 API / AI Agent 用户使用）
    ```
    Authorization: Bearer agbm_your_api_key
    ```
    在 [API Key 管理页面](https://alphagbm.com/api-keys) 创建，以 `agbm_` 开头。每用户最多5个。

    ### 方式二：Supabase JWT Token（网站前端使用）
    ```
    Authorization: Bearer <your_jwt_token>
    ```

    两种认证方式共享同一账户额度，系统通过 token 前缀自动区分。

    ## 服务类型
    | 服务类型 | 描述 |
    |---------|------|
    | stock_analysis | 股票分析 |
    | option_analysis | 期权分析 |
    | deep_report | 深度研报 |

    ## 投资风格
    | 风格 | 描述 |
    |------|------|
    | quality | 质量型 - 关注财务稳健、盈利能力强的优质公司 |
    | value | 价值型 - 寻找被市场低估的股票 |
    | growth | 成长型 - 追求高营收增长和盈利增长 |
    | momentum | 趋势型 - 跟随市场趋势和价格动量 |

  version: 1.0.0
  contact:
    name: AlphaGBM Team
    email: support@alphagbm.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:5002/api
    description: Development Server
  - url: https://api.alphagbm.com/api
    description: Production Server

tags:
  - name: Health
    description: 健康检查
  - name: Auth
    description: 认证相关
  - name: API Keys
    description: API Key 管理（创建、列出、删除、启停）
  - name: User
    description: 用户相关
  - name: Stock
    description: 股票分析
  - name: Options
    description: 期权分析
  - name: Tasks
    description: 异步任务查询
  - name: Payment
    description: 支付与订阅

paths:
  /health:
    get:
      tags: [Health]
      summary: 健康检查
      description: 检查API服务是否正常运行
      operationId: healthCheck
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ==================== Auth Endpoints ====================
  /auth/status:
    get:
      tags: [Auth]
      summary: 认证状态检查
      description: 检查认证服务状态
      operationId: authStatus
      responses:
        '200':
          description: 认证服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ==================== API Key Endpoints ====================
  /keys:
    get:
      tags: [API Keys]
      summary: 列出所有 API Key
      description: 返回当前用户的所有 API Key（仅返回前缀，不返回完整 key）
      operationId: listApiKeys
      security:
        - BearerAuth: []
      responses:
        '200':
          description: API Key 列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeyInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [API Keys]
      summary: 创建 API Key
      description: |
        创建新的 API Key。每用户最多 5 个。

        **重要：** 完整 key 仅在创建时返回一次，请立即保存。
      operationId: createApiKey
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Key 名称（便于识别）
                  example: My Laptop
            examples:
              basic:
                value:
                  name: "Production Server"
      responses:
        '201':
          description: 创建成功（完整 key 仅此一次返回）
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  key:
                    type: string
                    description: 完整 API Key（仅返回一次）
                    example: agbm_3f8a2b1c9e4d7a6b0f1e2d3c4b5a6978...
                  name:
                    type: string
                  prefix:
                    type: string
                    example: agbm_3f8a2b1c
                  message:
                    type: string
        '400':
          description: 已达上限（最多 5 个）
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keys/{key_id}:
    delete:
      tags: [API Keys]
      summary: 删除 API Key
      description: 永久删除指定的 API Key，使用该 key 的应用将立即失去访问权限
      operationId: deleteApiKey
      security:
        - BearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
        '404':
          description: Key 不存在
        '401':
          $ref: '#/components/responses/Unauthorized'

  /keys/{key_id}/toggle:
    post:
      tags: [API Keys]
      summary: 启用/停用 API Key
      description: 切换 API Key 的启用状态，停用后该 key 将无法认证
      operationId: toggleApiKey
      security:
        - BearerAuth: []
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 切换成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  is_active:
                    type: boolean
                  message:
                    type: string
        '404':
          description: Key 不存在
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== User Endpoints ====================
  /user/profile:
    get:
      tags: [User]
      summary: 获取用户资料
      description: 获取当前登录用户的资料信息
      operationId: getUserProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 用户资料
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== Stock Endpoints ====================
  /stock/analyze:
    post:
      tags: [Stock]
      summary: 股票智能分析
      description: |
        对指定股票进行全面分析，包括：
        - 市场数据获取
        - 风险评估
        - 目标价格计算
        - 止损价格计算
        - EV模型分析
        - AI深度分析报告

        **注意：** 此接口响应时间较长（10-30秒），因为需要调用AI进行分析
      operationId: analyzeStock
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockAnalyzeRequest'
            examples:
              美股:
                value:
                  ticker: AAPL
                  style: quality
              A股:
                value:
                  ticker: 600519.SS
                  style: value
              港股:
                value:
                  ticker: 0700.HK
                  style: growth
      responses:
        '200':
          description: 分析成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockAnalyzeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /stock/analyze-async:
    post:
      tags: [Stock]
      summary: 股票智能分析（异步）
      description: |
        提交异步分析任务，立即返回 task_id。通过 `/tasks/{task_id}` 轮询获取结果。

        **推荐 API 用户使用此接口**，避免长时间等待。
      operationId: analyzeStockAsync
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockAnalyzeRequest'
            examples:
              basic:
                value:
                  ticker: TSLA
                  style: balanced
      responses:
        '202':
          description: 任务已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== Task Endpoints ====================
  /tasks/{task_id}:
    get:
      tags: [Tasks]
      summary: 查询异步任务状态与结果
      description: |
        查询异步分析任务的进度和结果。

        **轮询建议：** 每 2-3 秒查询一次，任务通常在 10-30 秒内完成。

        状态流转：`pending` → `processing` → `completed` / `failed`
      operationId: getTaskStatus
      security:
        - BearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          description: 任务ID（由异步接口返回）
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 任务状态与结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 任务不存在

  # ==================== Options Endpoints ====================
  /options/expirations/{symbol}:
    get:
      tags: [Options]
      summary: 获取期权到期日列表
      description: 获取指定股票的可用期权到期日
      operationId: getExpirations
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          description: 股票代码
          schema:
            type: string
            example: AAPL
      responses:
        '200':
          description: 到期日列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpirationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /options/chain/{symbol}/{expiry_date}:
    get:
      tags: [Options]
      summary: 获取期权链
      description: 获取指定股票在特定到期日的完整期权链，包含评分
      operationId: getOptionChain
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          description: 股票代码
          schema:
            type: string
            example: AAPL
        - name: expiry_date
          in: path
          required: true
          description: 到期日 (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-02-21"
      responses:
        '200':
          description: 期权链数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionChainResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /options/quote/{symbol}:
    get:
      tags: [Options]
      summary: 获取股票报价
      description: 获取指定股票的基本报价信息
      operationId: getStockQuote
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          description: 股票代码
          schema:
            type: string
            example: AAPL
      responses:
        '200':
          description: 股票报价
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockQuoteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /options/history/{symbol}:
    get:
      tags: [Options]
      summary: 获取股票历史价格
      description: 获取指定股票的历史价格数据
      operationId: getStockHistory
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          description: 股票代码
          schema:
            type: string
            example: AAPL
        - name: days
          in: query
          required: false
          description: 获取天数
          schema:
            type: integer
            default: 60
            example: 60
      responses:
        '200':
          description: 历史价格数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /options/enhanced-analysis/{symbol}/{option_identifier}:
    get:
      tags: [Options]
      summary: 获取增强分析
      description: 获取期权的增强分析，包括VRP和风险评估
      operationId: getEnhancedAnalysis
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: path
          required: true
          description: 股票代码
          schema:
            type: string
            example: AAPL
        - name: option_identifier
          in: path
          required: true
          description: 期权标识符
          schema:
            type: string
            example: AAPL260220C00200000
      responses:
        '200':
          description: 增强分析数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedAnalysisResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /options/chain-async:
    post:
      tags: [Options]
      summary: 期权链分析（异步）
      description: |
        提交异步期权链分析任务。通过 `/tasks/{task_id}` 轮询获取结果。
      operationId: analyzeOptionChainAsync
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, expiry_date]
              properties:
                symbol:
                  type: string
                  example: TSLA
                expiry_date:
                  type: string
                  format: date
                  example: "2026-04-17"
      responses:
        '202':
          description: 任务已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /options/enhanced-async:
    post:
      tags: [Options]
      summary: 深度期权分析（异步）
      description: |
        提交异步深度期权分析任务（含 VRP、风险评估、Greeks）。
        通过 `/tasks/{task_id}` 轮询获取结果。
      operationId: analyzeEnhancedOptionAsync
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [symbol, option_identifier]
              properties:
                symbol:
                  type: string
                  example: TSLA
                option_identifier:
                  type: string
                  example: TSLA260417C00250000
      responses:
        '202':
          description: 任务已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncTaskCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== Payment Endpoints ====================
  /payment/pricing:
    get:
      tags: [Payment]
      summary: 获取定价信息
      description: 获取所有订阅计划和加油包的定价信息
      operationId: getPricing
      responses:
        '200':
          description: 定价信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricingResponse'

  /payment/credits:
    get:
      tags: [Payment]
      summary: 获取用户额度
      description: 获取当前用户的可用额度信息
      operationId: getCredits
      security:
        - BearerAuth: []
      parameters:
        - name: service_type
          in: query
          required: false
          description: 服务类型
          schema:
            type: string
            enum: [stock_analysis, option_analysis, deep_report]
            default: stock_analysis
      responses:
        '200':
          description: 用户额度信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payment/transactions:
    get:
      tags: [Payment]
      summary: 获取交易历史
      description: 获取当前用户的支付交易历史
      operationId: getTransactions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: 页码
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          required: false
          description: 每页数量
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 交易历史
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payment/create-checkout-session:
    post:
      tags: [Payment]
      summary: 创建支付会话
      description: 创建Stripe支付会话，用于购买订阅或加油包
      operationId: createCheckoutSession
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutRequest'
      responses:
        '200':
          description: 支付会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /payment/webhook:
    post:
      tags: [Payment]
      summary: Stripe Webhook回调
      description: |
        接收Stripe的Webhook回调，处理支付完成、订阅续费等事件。
        **注意：** 此接口由Stripe调用，无需手动调用
      operationId: handleWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook处理成功
        '400':
          description: 无效的Webhook请求

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        支持两种 Token 格式：
        - **API Key**: `agbm_` 开头（如 `agbm_3f8a2b1c...`），在 alphagbm.com/api-keys 创建
        - **JWT**: Supabase 登录后的 access_token（网站前端自动使用）

  responses:
    Unauthorized:
      description: 未授权 - Token无效或已过期
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              error:
                type: string

  schemas:
    # ==================== User Schemas ====================
    UserProfile:
      type: object
      properties:
        message:
          type: string
          example: User Profile Endpoint

    # ==================== Stock Schemas ====================
    StockAnalyzeRequest:
      type: object
      required:
        - ticker
      properties:
        ticker:
          type: string
          description: 股票代码
          example: AAPL
        style:
          type: string
          description: 投资风格
          enum: [quality, value, growth, momentum]
          default: quality
        onlyHistoryData:
          type: boolean
          description: 仅获取历史数据（不进行AI分析）
          default: false

    StockAnalyzeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/MarketData'
        risk:
          $ref: '#/components/schemas/RiskResult'
        report:
          type: string
          description: AI生成的分析报告（Markdown格式）

    MarketData:
      type: object
      properties:
        symbol:
          type: string
          example: AAPL
        name:
          type: string
          example: Apple Inc.
        price:
          type: number
          format: float
          example: 259.37
        currency_symbol:
          type: string
          example: $
        week52_high:
          type: number
          format: float
          example: 288.62
        week52_low:
          type: number
          format: float
          example: 169.21
        ma50:
          type: number
          format: float
          example: 272.58
        ma200:
          type: number
          format: float
          example: 232.80
        pe:
          type: number
          format: float
          example: 34.72
        forward_pe:
          type: number
          format: float
          example: 28.34
        peg:
          type: number
          format: float
          nullable: true
        growth:
          type: number
          format: float
          description: 营收增长率
          example: 0.079
        margin:
          type: number
          format: float
          description: 净利润率
          example: 0.2692
        beta:
          type: number
          format: float
          example: 1.24
        sector:
          type: string
          example: Technology
        industry:
          type: string
          example: Consumer Electronics
        is_etf_or_fund:
          type: boolean
          example: false
        target_price:
          type: number
          format: float
          example: 261.14
        stop_loss_price:
          type: number
          format: float
          example: 246.40
        stop_loss_method:
          type: string
          example: ATR动态止损
        market_sentiment:
          type: number
          format: float
          description: 市场情绪评分 (0-10)
          example: 5.5
        history_dates:
          type: array
          items:
            type: string
          description: 历史价格日期
        history_prices:
          type: array
          items:
            type: number
          description: 历史价格
        company_news:
          type: array
          items:
            $ref: '#/components/schemas/NewsItem'
        macro_data:
          $ref: '#/components/schemas/MacroData'
        options_data:
          $ref: '#/components/schemas/OptionsMarketData'
        market_warnings:
          type: array
          items:
            $ref: '#/components/schemas/MarketWarning'
        ev_model:
          $ref: '#/components/schemas/EVModel'

    NewsItem:
      type: object
      properties:
        title:
          type: string
        publisher:
          type: string
        link:
          type: string

    MacroData:
